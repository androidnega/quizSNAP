# =============================================================================
# QuizSnap — Redis (PRODUCTION ONLY)
# =============================================================================
# SERVER: 48 GB RAM total
# REDIS RESERVATION: 4 GB RAM (hard cap — do not raise without audit)
#
# maxmemory 3gb leaves ~1 GB for Redis process overhead, AOF buffers, replication.
# QuizSnap uses DB 0 (sessions/queue) and DB 1 (cache).
#
# INSTALL: /etc/redis/quizsnap.conf → include in /etc/redis/redis.conf
# Development: local .env uses file driver — Redis not required.
# =============================================================================

bind 127.0.0.1 ::1
protected-mode yes
port 6379
requirepass CHANGE_ME_REDIS_PASSWORD

# Hard cap within 4 GB reservation
maxmemory 3gb
maxmemory-policy allkeys-lru

# Light persistence — exams need low latency; AOF for recovery
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfsync everysec
no-appendfsync-on-rewrite yes
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# 2,500 students + workers + Reverb — headroom without over-allocating
maxclients 5000
tcp-backlog 256
timeout 300
tcp-keepalive 60

# 2 I/O threads — conserve CPU for QuizSnap PHP (8-core app budget)
io-threads 2
io-threads-do-reads yes
lazyfree-lazy-eviction yes
lazyfree-lazy-expire yes
lazyfree-lazy-server-del yes

loglevel notice
logfile /var/log/redis/redis-server.log

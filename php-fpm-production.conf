; =============================================================================
; QuizSnap — PHP-FPM pool (PRODUCTION ONLY)
; =============================================================================
; SERVER: 48 GB RAM | 12 CPU cores (total hardware)
;
; RESOURCE BUDGET (do NOT exceed):
;   Reserved for OS + infra:     4 CPU |  4 GB RAM
;   Reserved for Redis:          —     |  4 GB RAM (see redis-production.conf)
;   Reserved for MySQL:        —     |  8 GB RAM (see mysql-production.cnf)
;   Reserved for Netdata/Nginx:  —     |  2 GB RAM
;   QuizSnap application ONLY:   8 CPU | 24 GB RAM  ← this pool + queue + Reverb
;
; This pool budget (~14 GB typical, ~18 GB worst-case):
;   48 workers × ~192 MB memory_limit cap ≈ 9.2 GB theoretical max
;   Typical steady-state: 48 × ~100 MB ≈ 4.8 GB
;   Leaves headroom for queue workers, Reverb, and exam spikes
;
; INSTALL: /etc/php/8.4/fpm/pool.d/quizsnap.conf
; Development: NOT used locally (artisan serve).
; =============================================================================

[quizsnap]
user = www-data
group = www-data

listen = /run/php/php8.4-fpm-quizsnap.sock
listen.owner = www-data
listen.group = www-data
listen.mode = 0660

; Conservative dynamic PM — stability over max throughput
pm = dynamic
pm.max_children = 48
pm.start_servers = 10
pm.min_spare_servers = 5
pm.max_spare_servers = 20
pm.max_requests = 400

request_terminate_timeout = 90s
request_slowlog_timeout = 8s
slowlog = /var/log/php8.4-fpm-quizsnap-slow.log

pm.status_path = /fpm-status
ping.path = /fpm-ping
ping.response = pong

clear_env = no

php_admin_value[error_log] = /var/log/php8.4-fpm-quizsnap.log
php_admin_flag[log_errors] = on
php_admin_value[memory_limit] = 192M
php_admin_value[upload_max_filesize] = 24M
php_admin_value[post_max_size] = 28M
php_admin_value[max_execution_time] = 90
php_admin_value[max_input_time] = 90
php_admin_value[max_input_vars] = 3000

php_admin_value[realpath_cache_size] = 2048k
php_admin_value[realpath_cache_ttl] = 600

php_admin_value[opcache.enable] = 1
php_admin_value[opcache.memory_consumption] = 192
php_admin_value[opcache.interned_strings_buffer] = 16
php_admin_value[opcache.max_accelerated_files] = 15000
php_admin_value[opcache.validate_timestamps] = 0
php_admin_value[opcache.revalidate_freq] = 0
php_admin_value[opcache.jit] = 1255
php_admin_value[opcache.jit_buffer_size] = 64M

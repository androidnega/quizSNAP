# =============================================================================
# QuizSnap — Nginx site (PRODUCTION ONLY)
# =============================================================================
# SERVER: 48 GB / 12 CPU — Nginx shares 2 GB RAM reservation with Netdata/Supervisor
#
# ALSO set in /etc/nginx/nginx.conf (global, conservative):
#   worker_processes 4;          # not 12 — leave cores for PHP/MySQL/Redis
#   worker_rlimit_nofile 65535;
#   events { worker_connections 2048; multi_accept on; use epoll; }
#
# INSTALL: /etc/nginx/sites-available/quizsnap
# Development: artisan serve — this file is NOT used locally.
# =============================================================================

# Rate limits — protect auth; exam API allows bursts without exhausting PHP-FPM
limit_req_zone $binary_remote_addr zone=quizsnap_login:10m rate=8r/s;
limit_req_zone $binary_remote_addr zone=quizsnap_api:20m rate=40r/s;

upstream php-fpm-quizsnap {
    server unix:/run/php/php8.4-fpm-quizsnap.sock;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name quizsnap.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name quizsnap.example.com;

    root /var/www/quizsnap/public;
    index index.php;

  # TLS (Let's Encrypt certbot paths)
    ssl_certificate     /etc/letsencrypt/live/quizsnap.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/quizsnap.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    access_log /var/log/nginx/quizsnap-access.log;
    error_log  /var/log/nginx/quizsnap-error.log warn;

    client_max_body_size 36M;
    client_body_buffer_size 128k;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 5;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # Static assets — long cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Laravel Reverb WebSocket (proxied to local Reverb on 8080)
    location /app {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Scheme $scheme;
        proxy_set_header SERVER_PORT $server_port;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_pass http://127.0.0.1:8080;
    }

    # Exam hot paths — higher rate limit
    location ~ ^/(quiz/(save-answer|save-answers|heartbeat|time-sync|proctor-feed|violation)) {
        limit_req zone=quizsnap_api burst=60 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Login / OTP — stricter rate limit
    location ~ ^/(login|student/login|otp) {
        limit_req zone=quizsnap_login burst=20 nodelay;
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php-fpm-quizsnap;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;

        fastcgi_connect_timeout 10s;
        fastcgi_send_timeout 120s;
        fastcgi_read_timeout 120s;
        fastcgi_buffer_size 64k;
        fastcgi_buffers 8 64k;
        fastcgi_busy_buffers_size 128k;

        # Keepalive to PHP-FPM upstream
        fastcgi_keep_conn on;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }

    # PHP-FPM status (internal / monitoring only)
    location ~ ^/(fpm-status|fpm-ping)$ {
        allow 127.0.0.1;
        deny all;
        include fastcgi_params;
        fastcgi_pass php-fpm-quizsnap;
    }
}
